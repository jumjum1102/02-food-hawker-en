<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Singapore Hawker Culture Guide | English</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #0D0D0D; color: #F0EDE8; }
    img { display: block; max-width: 100%; }
    button { font: inherit; }
    a { color: inherit; }

    :root {
      --gold: #D4A843;
      --bg: #0D0D0D;
      --bg2: #0A0A0A;
      --line: #1E1E1E;
      --muted: #888;
      --text: #C8C4BE;
      --white: #F0EDE8;
      --content-max: 1180px;
      --content-narrow: 980px;
    }

    .page-shell {
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg);
    }

    .content-wrap {
      width: min(var(--content-max), calc(100vw - 32px));
      margin: 0 auto;
    }

    .content-wrap.narrow {
      width: min(var(--content-narrow), calc(100vw - 32px));
      margin: 0 auto;
    }

    .section-pad {
      padding: clamp(44px, 7vw, 96px) 0;
      border-bottom: 1px solid #1A1A1A;
    }

    .section-alt {
      background: var(--bg2);
    }

    .hero-inner {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      position: relative;
      z-index: 2;
      padding-bottom: clamp(52px, 8vw, 72px);
    }

    .hero-copy {
      max-width: 760px;
    }

    .hero-title {
      font-family: "Noto Serif JP", serif;
      font-size: clamp(32px, 6vw, 72px);
      line-height: 1.18;
      margin: 0 0 14px;
      word-break: keep-all;
    }

    .hero-sub {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: clamp(14px, 2vw, 20px);
      color: #999;
      margin-bottom: 20px;
    }

    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 28px 0 36px;
    }

    .dish-category {
      margin-bottom: clamp(40px, 5vw, 60px);
    }

    .dish-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .dish-card {
      border: 1px solid #222;
      background: #0F0F0F;
      overflow: hidden;
      border-radius: 2px;
    }

    .dish-card-inner {
      display: grid;
      grid-template-columns: 1fr;
    }

    .dish-image-wrap {
      position: relative;
      min-height: 220px;
      height: clamp(220px, 34vw, 320px);
      overflow: hidden;
      background: #111;
    }

    .dish-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.82);
    }

    .section-photo {
      width: 100%;
      height: clamp(220px, 32vw, 360px);
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.76);
      margin-bottom: 28px;
      border-radius: 2px;
    }

    .timeline-wrap {
      max-width: 920px;
    }

    .rules-grid,
    .payment-grid,
    .tips-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .top10-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .visit-strategy,
    .tips-box,
    .history-box,
    .price-box,
    .important-box {
      max-width: 920px;
    }

    .body-copy {
      font-size: clamp(14px, 1.2vw, 16px);
      line-height: 2;
      color: var(--text);
    }

    .small-copy {
      font-size: clamp(11px, 1vw, 12px);
      line-height: 1.9;
      color: var(--muted);
    }

    .footer-inner {
      width: min(var(--content-narrow), calc(100vw - 32px));
      margin: 0 auto;
    }

    .desktop-rail {
      position: fixed;
      top: 0;
      left: 0;
      width: 56px;
      height: 100vh;
      background: var(--bg);
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      z-index: 200;
      overflow: hidden;
    }

    .desktop-main {
      margin-left: 56px;
    }

    .mobile-bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(13,13,13,0.97);
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 200;
      padding: 6px 0 10px;
    }

    .mobile-main {
      padding-bottom: 58px;
    }

    @media (min-width: 900px) {
      .metric-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .dish-grid {
        grid-template-columns: 1fr;
      }

      .dish-card-inner {
        grid-template-columns: minmax(320px, 40%) 1fr;
      }

      .dish-image-wrap {
        height: 100%;
        min-height: 280px;
      }

      .rules-grid,
      .payment-grid,
      .tips-grid,
      .top10-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 1200px) {
      .dish-card-inner {
        grid-template-columns: minmax(360px, 38%) 1fr;
      }

      .rules-grid {
        grid-template-columns: 1fr 1fr;
      }

      .payment-grid {
        grid-template-columns: 1fr 1fr;
      }

      .tips-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

    const HAWKER_TOP10 = [

            en: "Hainanese Chicken Rice",
            origin: "🇨🇳 Hainan, China",
            price: "S$5–8",
            img: "https://commons.wikimedia.org/wiki/Special:FilePath/Hainanese%20chicken%20rice%20in%20Singapore.jpg",
            desc: "Often called Singapore’s national dish. Hainanese migrants adapted Wenchang chicken traditions into a local classic: poached chicken served with fragrant rice cooked in stock. Chilli, ginger, and dark soy sauce complete the set. It evolved into its distinct Singapore form in the early 20th century.",

          {
            name: "Char Kway Teow",

          },

          },

      },
      {

        items: [

    const GOLD = "#D4A843";
    const BG = "#0D0D0D";
    const BG2 = "#0A0A0A";
    const LINE = "#1E1E1E";
    const MUTED = "#888";
    const TEXT = "#C8C4BE";
    const WHITE = "#F0EDE8";

    function useViewport() {
      const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1200);
      useEffect(() => {
        const h = () => setW(window.innerWidth);
        window.addEventListener("resize", h);
        return () => window.removeEventListener("resize", h);
      }, []);
      return {
        width: w,
        isMobile: w < 640,
        isTabletUp: w >= 900,
        isDesktop: w >= 1200,
      };
    }

    function SectionHeader({ num, ja, en, compact=false }) {
      return (
        <div style={{ marginBottom: compact ? 28 : 48 }}>
          <div style={{ marginBottom: compact ? 18 : 36 }}>
            <div style={{ fontFamily: "sans-serif", fontSize: 9, letterSpacing: 3, color: GOLD, textTransform: "uppercase", marginBottom: 8 }}>
              {num}
            </div>
            <div style={{ fontSize: compact ? 20 : "clamp(22px,4vw,40px)", fontWeight: 700, lineHeight: 1.35, whiteSpace: "pre-wrap" }}>
              {ja}
            </div>
            <div style={{ fontFamily: "'Georgia',serif", fontStyle: "italic", fontSize: 13, color: "#555", marginTop: 4 }}>
              {en}
            </div>
          </div>
          <div style={{ width: "100%", height: 1, background: LINE }} />
        </div>
      );
    }

    function TLItem({ year, title, text, compact=false }) {
      return (
        <div style={{ display: "flex", gap: compact ? 12 : 24, paddingBottom: 28 }}>
          <div style={{ fontFamily: "sans-serif", fontSize: compact ? 14 : 20, color: GOLD, flexShrink: 0, width: compact ? 54 : 80, paddingTop: 2, fontWeight: 700, lineHeight: 1.2 }}>
            {year}
          </div>
          <div style={{ flex: 1, paddingBottom: 20, borderBottom: `1px solid ${LINE}` }}>
            <div style={{ fontSize: compact ? 13 : 15, fontWeight: 700, marginBottom: 5 }}>{title}</div>
            <div style={{ fontSize: compact ? 12 : 13, lineHeight: 1.9, color: MUTED }}>{text}</div>
          </div>
        </div>
      );
    }

    function App() {
      const { isMobile, isTabletUp, isDesktop } = useViewport();
      const [active, setActive] = useState("hero");
      const [openCard, setOpenCard] = useState(null);

      useEffect(() => {
        const obs = new IntersectionObserver(
          (entries) => entries.forEach((e) => {
            if (e.isIntersecting) setActive(e.target.id);
          }),
          { threshold: 0.3 }
        );

        NAV_ITEMS.forEach(({ id }) => {
          const el = document.getElementById(id);
          if (el) obs.observe(el);
        });

        return () => obs.disconnect();
      }, []);

      const go = (id) => {
        document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });
        setActive(id);
      };

        width: "100%",
        height: isMobile ? 220 : isDesktop ? 360 : 300,
        objectFit: "cover",
        objectPosition: "center center",
        filter: "brightness(0.75)",

      };

                    {en}
                  </div>
                </div>
              ))}
            </nav>

                <div className="hero-copy">
                  <div style={{ fontFamily: "sans-serif", fontSize: 9, letterSpacing: isMobile ? 3 : 6, color: GOLD, marginBottom: 12, textTransform: "uppercase" }}>
                    Singapore Hawker Culture — Complete Guide
                  </div>

                    Singapore<br />Hawker Centre<br />Guide

                    { icon: "🏅", t: "Michelin and Bib Gourmand", b: "Singapore’s Michelin Guide includes many hawker stalls. A Bib Gourmand listing signals strong quality and good value. Tian Tian Chicken Rice at Maxwell is one of the best-known names." },
                  ].map((t, i) => (
                    <div key={i} style={{ display: "flex", gap: 14, padding: "14px 0", borderBottom: `1px solid ${LINE}` }}>
                      <div style={{ fontSize: 20, flexShrink: 0, width: 28 }}>{t.icon}</div>
                      <div>
                        <div style={{ fontSize: isMobile ? 13 : 14, fontWeight: 700, marginBottom: 4 }}>{t.t}</div>
                        <div style={small}>{t.b}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <footer style={{ padding: isMobile ? "36px 0 20px" : "44px 0 28px", borderTop: `1px solid #1A1A1A` }}>
              <div className="footer-inner">
                <div style={{ fontFamily: "'Georgia',serif", fontStyle: "italic", fontSize: isMobile ? 18 : 22, color: GOLD, marginBottom: 6 }}>
                  Hawker Culture Singapore
                </div>
                <div style={{ fontFamily: "sans-serif", fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 16 }}>
                  UNESCO Intangible Cultural Heritage of Humanity — 2020
                </div>
                <div style={{ fontFamily: "sans-serif", fontSize: 10, color: "#333", lineHeight: 1.8 }}>
                  This page is based on research, but hawker centre opening hours and stall details may change. Please check the latest information on the official NEA website or on site.<br />
                  Images stored externally.
                </div>
              </div>
            </footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
